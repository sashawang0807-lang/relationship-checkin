<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relationship Check-In v2</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container">
    <header>
      <h1>Relationship Check-In</h1>
      <p>A private alignment tool for Friday’s conversation.</p>
    </header>

    <section id="home" class="card">
      <h2>Who are you?</h2>
      <p>Choose your name and answer honestly. No code, no login.</p>
      <div class="person-grid">
        <button type="button" onclick="selectPerson('Jingyi')">❤️ Jingyi</button>
        <button type="button" onclick="selectPerson('Rodrigo')">❤️ Rodrigo</button>
      </div>
      <button type="button" class="secondary" onclick="showDashboard()">View Dashboard</button>
    </section>

    <form id="form" class="card hidden">
      <div class="form-header">
        <button type="button" class="secondary small-btn" onclick="goHome()">← Back</button>
        <h2 id="formTitle"></h2>
      </div>

      <div id="questions"></div>

      <section class="question final-box">
        <h3>Final thoughts</h3>
        <p>Anything else you want to say before Friday?</p>
        <textarea id="finalThoughts" placeholder="Write your final thoughts here..."></textarea>
      </section>

      <button type="submit">Submit Answers</button>
      <p id="status"></p>
    </form>

    <section id="dashboard" class="card hidden">
      <div class="form-header">
        <button type="button" class="secondary small-btn" onclick="goHome()">← Back</button>
        <h2>Dashboard</h2>
      </div>
      <p>This shows the latest submitted answer from each person.</p>
      <button type="button" onclick="loadDashboard()">Refresh Dashboard</button>

      <div id="completion"></div>
      <div id="summary"></div>
      <div id="compare"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
